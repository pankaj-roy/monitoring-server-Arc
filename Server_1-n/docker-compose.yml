global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:

  - job_name: prometheus
    static_configs:
      - targets:
          - prometheus:9090

  - job_name: monitoring-node
    static_configs:
      - targets:
          - node-exporter:9100

  - job_name: monitoring-cadvisor
    static_configs:
      - targets:
          - cadvisor:8080

  - job_name: server1-node
    static_configs:
      - targets:
          - 3.27.16.72:9100

  - job_name: server1-cadvisor
    static_configs:
      - targets:
          - 3.27.16.72:8080

  - job_name: server2-node
    static_configs:
      - targets:
          - 54.252.156.168:9100

  - job_name: server2-cadvisor
    static_configs:
      - targets:
          - 54.252.156.168:8080